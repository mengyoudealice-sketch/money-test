<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金钱人格测试</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#f5efe4;--bg-secondary:#ede4d3;--bg-tertiary:#e8dcc6;--text-primary:#2c2416;--text-secondary:#6b5d47;--text-tertiary:#9a8b6f;--accent:#8b6f47;--accent-dark:#5c4a30;--accent-light:#c4a882;--divider:#d4c5a8;--shadow:rgba(92,74,48,0.08);--shadow-hover:rgba(92,74,48,0.15)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Noto Serif SC','Cormorant Garamond',serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.8;min-height:100vh;overflow-x:hidden;font-weight:300}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 30%,rgba(196,168,130,0.08) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(139,111,71,0.06) 0%,transparent 50%);pointer-events:none;z-index:0}
.page{display:none}.page.active{display:block;animation:fadeIn 0.8s ease}.cover.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.cover{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:60px 40px;position:relative;z-index:1}
.cover-ornament{font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:8px;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:30px;font-style:italic}
.cover-title{font-family:'Fraunces','Noto Serif SC',serif;font-size:clamp(40px,7vw,72px);font-weight:300;line-height:1.2;margin-bottom:24px;letter-spacing:-1px}
.cover-title .highlight{font-style:italic;font-weight:400;color:var(--accent);display:block;margin-top:8px}
.cover-divider{width:60px;height:1px;background:var(--accent);margin:30px 0}
.cover-poem{max-width:520px;font-size:16px;color:var(--text-secondary);line-height:2.2;margin-bottom:50px;font-style:italic}
.cover-meta{display:flex;gap:60px;margin-bottom:50px;color:var(--text-tertiary);font-size:13px;letter-spacing:2px}
.cover-meta-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.cover-meta-item span:first-child{font-family:'Fraunces',serif;font-size:28px;font-weight:400;color:var(--accent);font-style:italic}
.btn-start{background:var(--accent-dark);color:var(--bg-primary);border:none;padding:18px 56px;font-size:14px;letter-spacing:4px;font-family:'Noto Serif SC',serif;cursor:pointer;transition:all 0.4s ease}
.btn-start:hover{background:var(--accent);box-shadow:0 20px 40px var(--shadow-hover);transform:translateY(-2px)}

.test-page{min-height:100vh;padding:60px 40px 100px;position:relative;z-index:1}
.progress-wrapper{max-width:720px;margin:0 auto 60px}
.progress-info{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;font-family:'Cormorant Garamond',serif}
.progress-label{font-size:12px;letter-spacing:4px;color:var(--text-tertiary);text-transform:uppercase}
.progress-count{font-size:18px;color:var(--accent);font-style:italic}
.progress-count .current{font-size:28px;font-weight:400}
.progress-bar{width:100%;height:1px;background:var(--divider);position:relative;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:width 0.6s cubic-bezier(0.23,1,0.32,1)}
.question-container{max-width:680px;margin:0 auto}
.question-category{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:6px;color:var(--accent);text-transform:uppercase;margin-bottom:20px;font-style:italic}
.question-text{font-family:'Fraunces','Noto Serif SC',serif;font-size:clamp(20px,3vw,28px);line-height:1.6;margin-bottom:40px;font-weight:400;color:var(--text-primary);letter-spacing:-0.3px}
.options{display:flex;flex-direction:column;gap:14px}
.option{background:var(--bg-secondary);border:1px solid transparent;padding:20px 26px;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:flex-start;gap:18px;font-family:'Noto Serif SC',serif;font-size:15px;line-height:1.7;color:var(--text-primary);position:relative;text-align:left;border-radius:2px}
.option::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);transform:scaleY(0);transition:transform 0.3s ease;transform-origin:top}
.option:hover{background:var(--bg-tertiary);transform:translateX(4px)}.option:hover::before{transform:scaleY(1)}
.option.selected{background:var(--bg-tertiary);border-color:var(--accent)}.option.selected::before{transform:scaleY(1)}
.option-letter{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--accent);font-weight:500;min-width:20px}
.nav-buttons{display:flex;justify-content:space-between;align-items:center;margin-top:50px;padding-top:24px;border-top:1px solid var(--divider)}
.btn-nav{background:transparent;border:none;padding:10px 20px;font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:3px;color:var(--text-secondary);cursor:pointer;transition:all 0.3s ease}
.btn-nav:hover:not(:disabled){color:var(--accent)}.btn-nav:disabled{opacity:0.3;cursor:not-allowed}
.btn-next{background:var(--accent-dark);color:var(--bg-primary);padding:14px 36px;letter-spacing:4px}
.btn-next:hover:not(:disabled){background:var(--accent);color:var(--bg-primary);transform:translateY(-2px);box-shadow:0 10px 25px var(--shadow)}
.btn-next:disabled{background:var(--divider);color:var(--text-tertiary);cursor:not-allowed}

.result-page{min-height:100vh;padding:60px 0 100px;position:relative;z-index:1}
.version-toggle{position:sticky;top:20px;z-index:100;display:flex;justify-content:center;margin-bottom:30px;pointer-events:none}
.version-toggle-inner{display:inline-flex;background:var(--bg-secondary);border:1px solid var(--divider);border-radius:100px;padding:4px;pointer-events:auto;box-shadow:0 4px 16px var(--shadow)}
.toggle-btn{padding:10px 24px;font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:2px;color:var(--text-secondary);background:transparent;border:none;cursor:pointer;border-radius:100px;transition:all 0.3s ease}
.toggle-btn.active{background:var(--accent-dark);color:var(--bg-primary)}
.result-hero{text-align:center;padding:40px 40px 60px;max-width:760px;margin:0 auto;border-bottom:1px solid var(--divider);margin-bottom:60px}
.result-label{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:8px;color:var(--text-tertiary);text-transform:uppercase;font-style:italic;margin-bottom:24px}
.result-name{font-family:'Fraunces','Noto Serif SC',serif;font-size:clamp(48px,8vw,80px);font-weight:300;line-height:1.1;margin-bottom:16px;color:var(--accent-dark);letter-spacing:-2px}
.result-name-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--accent);margin-bottom:30px;font-weight:400;letter-spacing:2px}
.result-tagline{font-family:'Fraunces','Noto Serif SC',serif;font-style:italic;font-size:18px;color:var(--text-primary);border-left:2px solid var(--accent);padding:12px 24px;display:inline-block;margin:20px auto;text-align:left}
.result-section{max-width:680px;margin:0 auto;padding:40px 40px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:6px;color:var(--accent);text-transform:uppercase;margin-bottom:20px;font-style:italic;display:flex;align-items:center;gap:16px}
.section-title::before{content:'';width:28px;height:1px;background:var(--accent)}
.section-content{font-size:15px;line-height:2;color:var(--text-secondary);margin-bottom:16px}
.section-content p{margin-bottom:16px}.section-content strong{color:var(--accent-dark);font-weight:500}
.list-item{display:flex;gap:16px;margin-bottom:20px;padding:4px 0;align-items:flex-start}
.list-marker{font-family:'Cormorant Garamond',serif;color:var(--accent);font-size:18px;font-style:italic;min-width:24px;line-height:1.6}
.list-content{flex:1;color:var(--text-secondary);line-height:1.9;font-size:15px}
.list-content strong{color:var(--text-primary);display:block;margin-bottom:4px;font-weight:500}

.conflict-section{max-width:680px;margin:60px auto;padding:40px;background:var(--bg-secondary);border:1px solid var(--divider);border-radius:4px}
.conflict-meter{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.conflict-bar{flex:1;height:6px;background:var(--bg-primary);border-radius:3px;overflow:hidden}
.conflict-fill{height:100%;background:linear-gradient(to right,#7a8b6f,#c4a882,#b56b5a);border-radius:3px;transition:width 1s cubic-bezier(0.23,1,0.32,1)}
.conflict-value{font-family:'Fraunces',serif;font-style:italic;font-size:24px;color:var(--accent-dark);font-weight:400;min-width:60px;text-align:right}
.conflict-level{font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:4px;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:16px;font-style:italic}
.conflict-text{font-size:15px;line-height:2;color:var(--text-secondary)}
.conflict-text p{margin-bottom:12px}

.celebrity-card{background:var(--bg-secondary);padding:32px;margin:24px 0;position:relative;border:1px solid var(--divider);border-radius:4px}
.celebrity-card::before{content:'';position:absolute;top:-1px;left:-1px;width:24px;height:24px;border-top:2px solid var(--accent);border-left:2px solid var(--accent)}
.celebrity-card::after{content:'';position:absolute;bottom:-1px;right:-1px;width:24px;height:24px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent)}
.celebrity-name{font-family:'Fraunces','Noto Serif SC',serif;font-size:20px;font-weight:500;color:var(--accent-dark);margin-bottom:6px}
.celebrity-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--text-tertiary);margin-bottom:18px;letter-spacing:1px}
.celebrity-card p{color:var(--text-secondary);line-height:1.9;font-size:14.5px;margin-bottom:12px}
.celebrity-quote{font-family:'Fraunces','Noto Serif SC',serif;font-style:italic;color:var(--accent-dark);background:var(--bg-primary);padding:16px 20px;margin:12px 0;border-left:2px solid var(--accent);font-size:15px}
.book-card{background:var(--bg-primary);border:1px solid var(--divider);padding:26px;margin-bottom:18px;transition:all 0.3s ease;border-radius:4px}
.book-card:hover{background:var(--bg-secondary);transform:translateY(-3px);box-shadow:0 16px 32px var(--shadow)}
.book-title{font-family:'Fraunces','Noto Serif SC',serif;font-size:18px;font-weight:500;color:var(--accent-dark);margin-bottom:4px}
.book-author{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--text-tertiary);margin-bottom:14px;font-size:14px}
.book-reason{color:var(--text-secondary);line-height:1.9;font-size:14.5px}
.final-section{max-width:680px;margin:60px auto 0;padding:60px 40px;border-top:1px solid var(--divider);text-align:center}
.final-content{color:var(--text-secondary);line-height:2.2;font-size:16px;font-style:italic}.final-content p{margin-bottom:16px}.final-content strong{color:var(--accent-dark);font-weight:500;font-style:normal}
.community-box{background:var(--bg-secondary);padding:40px 32px;margin:50px 0;text-align:left;border:1px solid var(--divider);border-radius:4px}
.community-box h3{font-family:'Fraunces','Noto Serif SC',serif;font-size:20px;font-weight:500;color:var(--accent-dark);margin-bottom:14px;text-align:center}
.community-box .subtitle{text-align:center;color:var(--text-tertiary);font-style:italic;margin-bottom:24px;font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:2px}
.community-list{list-style:none}.community-list li{padding:12px 0;border-bottom:1px dashed var(--divider);color:var(--text-secondary);display:flex;gap:14px;align-items:flex-start;line-height:1.8;font-size:14.5px}.community-list li:last-child{border-bottom:none}.community-list li::before{content:'◦';color:var(--accent);font-size:18px;line-height:1;margin-top:4px}.community-list strong{color:var(--text-primary);display:block;margin-bottom:2px}
.btn-restart{background:transparent;border:1px solid var(--accent);color:var(--accent-dark);padding:14px 36px;font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:4px;cursor:pointer;transition:all 0.3s ease;margin-top:30px;border-radius:2px}
.btn-restart:hover{background:var(--accent-dark);color:var(--bg-primary);border-color:var(--accent-dark)}

.fun-version .result-hero{background:linear-gradient(135deg,#fff5e6 0%,#ffe9c8 100%);border-radius:4px;max-width:760px;margin:0 auto 40px;padding:50px 30px;text-align:center}
.fun-version .result-name{font-size:clamp(36px,6vw,56px);color:var(--accent-dark)}
.fun-version .result-tagline{font-style:normal;font-family:'Noto Serif SC',serif;font-size:16px;background:rgba(255,255,255,0.5);border-left:3px solid var(--accent)}
.fun-section{max-width:680px;margin:0 auto;padding:30px 40px}
.fun-block{background:var(--bg-secondary);border-radius:4px;padding:28px 32px;margin-bottom:20px;border:1px solid var(--divider)}
.fun-block-title{font-family:'Fraunces','Noto Serif SC',serif;font-size:18px;color:var(--accent-dark);margin-bottom:16px;font-weight:500;display:flex;align-items:center;gap:8px}
.fun-block-title::before{content:'✦';color:var(--accent);font-style:italic}
.fun-content{color:var(--text-primary);line-height:1.9;font-size:15px}.fun-content p{margin-bottom:10px}
.fun-list{list-style:none}.fun-list li{padding:8px 0;display:flex;gap:12px;align-items:flex-start;font-size:14.5px;color:var(--text-primary);line-height:1.7}.fun-list li::before{content:'◆';color:var(--accent);font-size:14px;margin-top:4px}
.fun-dialog{background:var(--bg-primary);padding:14px 20px;border-radius:4px;margin:6px 0;font-size:14.5px;display:flex;gap:10px}
.fun-dialog-who{color:var(--accent);font-weight:500;min-width:70px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px}
.fun-dialog-what{color:var(--text-primary);flex:1}

@keyframes slideInOption{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.options.animate .option{animation:slideInOption 0.4s ease forwards;opacity:0}
.options.animate .option:nth-child(1){animation-delay:0.05s}.options.animate .option:nth-child(2){animation-delay:0.1s}.options.animate .option:nth-child(3){animation-delay:0.15s}.options.animate .option:nth-child(4){animation-delay:0.2s}.options.animate .option:nth-child(5){animation-delay:0.25s}

@media(max-width:768px){.cover{padding:50px 24px}.cover-meta{flex-direction:row;gap:24px}.test-page{padding:40px 20px 80px}.question-text{font-size:19px}.option{padding:16px 20px;font-size:14.5px}.result-hero{padding:30px 24px 40px}.result-name{font-size:44px}.result-section,.fun-section{padding:30px 24px}.celebrity-card,.book-card,.conflict-section,.community-box{padding:24px 20px}.fun-version .result-hero{padding:40px 20px}.fun-block{padding:22px 20px}}
</style>
</head>
<body>

<div class="page cover active" id="coverPage" style="display:flex">
  <div class="cover-ornament">— Money Personality Test —</div>
  <h1 class="cover-title">金钱人格<span class="highlight">测试</span></h1>
  <div class="cover-divider"></div>
  <p class="cover-poem">每个人的钱包里都藏着一个秘密，<br>是我们与这个世界相处的方式。<br><br>接下来的 30 个小瞬间，<br>愿你在其中看见自己。</p>
  <div class="cover-meta">
    <div class="cover-meta-item"><span>30</span><span>道题目</span></div>
    <div class="cover-meta-item"><span>10</span><span>种人格</span></div>
    <div class="cover-meta-item"><span>15'</span><span>分钟</span></div>
  </div>
  <button class="btn-start" onclick="startTest()">开 始 测 试</button>
</div>

<div class="page test-page" id="testPage" style="display:none">
  <div class="progress-wrapper">
    <div class="progress-info">
      <span class="progress-label">Progress</span>
      <span class="progress-count"><span class="current" id="currentQ">1</span><span> / 30</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="question-container">
    <div class="question-category" id="categoryLabel"></div>
    <h2 class="question-text" id="questionText"></h2>
    <div class="options animate" id="optionsContainer"></div>
    <div class="nav-buttons">
      <button class="btn-nav" id="prevBtn" onclick="prevQuestion()" disabled>← 上一题</button>
      <button class="btn-nav btn-next" id="nextBtn" onclick="nextQuestion()" disabled>下 一 题 →</button>
    </div>
  </div>
</div>

<div class="page result-page" id="resultPage" style="display:none"></div>

<script>
// ============ 题目数据 ============
const QUESTIONS = [
  // 第一部分 · 日常里的你
  {
    category: "日常里的你",
    text: "周二晚上，你想买一袋抽纸。打开购物软件，几家店价格有高有低，有的需要凑单。你的手指停在屏幕上——",
    options: [
      { text: "点开价格最低的那家，研究怎么凑单最划算", scores: { saver: 2, security: 1 } },
      { text: "随便选一家顺眼的，不想在抽纸上花心思", scores: { flyer: 2 } },
      { text: "选那个包装设计最舒服的，贵一点也无所谓", scores: { spender: 2 } },
      { text: "看看常买的牌子有没有折扣，没有就等等", scores: { saver: 1, security: 2 } },
      { text: "关掉App，家里好像还有，想起来再买", scores: { flyer: 2 } }
    ]
  },
  {
    category: "日常里的你",
    text: "关于优惠券：",
    options: [
      { text: "会主动收集，买东西前习惯性查一下", scores: { saver: 2, security: 1 } },
      { text: "偶尔用，遇到了就用，不会特意找", scores: { flyer: 1 } },
      { text: "几乎不用，觉得为了省那一点不值得花时间", scores: { spender: 1, flyer: 1 } },
      { text: "用起来很有成就感，省下的就是赚到的", scores: { saver: 2 } },
      { text: "不太清楚怎么用，也不太在意", scores: { flyer: 2 } }
    ]
  },
  {
    category: "日常里的你",
    text: "下班路过常去的咖啡店，保温杯里还剩一点早上自己泡的茶。咖啡的味道飘过来——",
    options: [
      { text: "拎一杯就走，今天值得被一杯热咖啡温暖", scores: { spender: 2 } },
      { text: "走过去了，杯里的茶也挺好", scores: { saver: 2 } },
      { text: "停了一下，还是买了，但喝的时候闪过\"其实没必要\"", scores: { saver: 1, spender: 1 } },
      { text: "完全看当下心情", scores: { flyer: 2 } },
      { text: "看看有没有什么优惠", scores: { saver: 1, security: 1 } }
    ]
  },
  {
    category: "日常里的你",
    text: "点外卖时看到满减活动，再凑一点就能优惠。你本来只想吃一份简单的——",
    options: [
      { text: "认真凑，多点的明天还能吃", scores: { saver: 2, security: 1 } },
      { text: "不凑，就吃想吃的", scores: { spender: 1, flyer: 1 } },
      { text: "象征性加一个最便宜的过线", scores: { saver: 1, security: 1 } },
      { text: "换一家不搞满减的店", scores: { flyer: 2 } },
      { text: "干脆点一份更想吃的，不纠结", scores: { spender: 2 } }
    ]
  },
  {
    category: "日常里的你",
    text: "朋友推荐一个护肤品，价格比你平时用的贵不少。她说\"真的不一样\"——",
    options: [
      { text: "先记下来，回去查成分和评价", scores: { security: 2 } },
      { text: "既然她说好我也想试试，对自己好是值得的", scores: { spender: 2 } },
      { text: "差不多就行，平价的也能用", scores: { saver: 2 } },
      { text: "搜一下有没有小样，试过再说", scores: { saver: 1, security: 1 } },
      { text: "如果真的好，贵就贵点吧", scores: { spender: 1, flyer: 1 } }
    ]
  },
  
  // 第二部分 · 关系里的你
  {
    category: "关系里的你",
    text: "好朋友生日快到了。你看到一个礼物，一眼就知道她会喜欢。但它超出你心里那个数大概三四成——",
    options: [
      { text: "就买这个，她值得", scores: { spender: 2 } },
      { text: "找一个差不多风格但便宜些的", scores: { saver: 1, security: 1 } },
      { text: "买预算内的，配一张写了很多话的卡", scores: { saver: 1, flyer: 1 } },
      { text: "超了就超了，朋友生日又不是天天过", scores: { spender: 1, risktaker: 1, flyer: 1 } },
      { text: "问问其他朋友要不要一起凑", scores: { security: 1, flyer: 1 } }
    ]
  },

// ============ 页面切换 ============
function showPage(id) {
  ['coverPage', 'testPage', 'resultPage'].forEach(pid => {
    const el = document.getElementById(pid);
    if (pid === id) {
      el.style.display = pid === 'coverPage' ? 'flex' : 'block';
      el.classList.add('active');
    } else {
      el.style.display = 'none';
      el.classList.remove('active');
    }
  });
  window.scrollTo(0, 0);
}

function startTest() {
  showPage('testPage');

// ============ 题目加载 ============
function loadQuestion(index) {
  const q = QUESTIONS[index];
  document.getElementById('categoryLabel').textContent = q.category;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('currentQ').textContent = index + 1;
  document.getElementById('progressFill').style.width = ((index + 1) / QUESTIONS.length * 100) + '%';

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  const letters = ['A', 'B', 'C', 'D', 'E'];
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[index] === i ? ' selected' : '');
    div.setAttribute('data-index', i);
    div.innerHTML = '<span class="option-letter">' + letters[i] + '</span><span>' + opt.text + '</span>';
    div.addEventListener('click', function() { selectOption(i); });
    container.appendChild(div);
  });

  document.getElementById('prevBtn').disabled = index === 0;
  updateNextBtn();
}

function selectOption(i) {
  answers[currentQuestion] = i;
  const options = document.getElementById('optionsContainer').children;
  for (let j = 0; j < options.length; j++) {
    if (j === i) {
      options[j].classList.add('selected');
    } else {
      options[j].classList.remove('selected');
    }
  }
  updateNextBtn();
}

function updateNextBtn() {
  const btn = document.getElementById('nextBtn');
  const answered = answers[currentQuestion] !== undefined;
  btn.disabled = !answered;
  btn.textContent = currentQuestion === QUESTIONS.length - 1 ? '查 看 结 果 →' : '下 一 题 →';
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    loadQuestion(currentQuestion);
    window.scrollTo(0, 0);
  }
}

function nextQuestion() {
  if (answers[currentQuestion] === undefined) return;
  if (currentQuestion < QUESTIONS.length - 1) {
    currentQuestion++;
    loadQuestion(currentQuestion);
    window.scrollTo(0, 0);
  } else {
    showResult();
  }
}

// ============ 计分 ============
function calculateResult() {
  const scores = { saver: 0, spender: 0, risktaker: 0, security: 0, flyer: 0 };
  let conflictExtra = 0;

  answers.forEach((ansIdx, qIdx) => {
    const opt = QUESTIONS[qIdx].options[ansIdx];
    if (opt.scores) {
      for (const [type, val] of Object.entries(opt.scores)) {
        scores[type] += val;
      }
    }
    if (opt.conflict !== undefined) {
      conflictExtra += opt.conflict;
    }
  });

  // 排序找主次人格
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0];
  const secondary = sorted[1];
  
  // 映射到10种人格
  const mapKey = primary[0] + '-' + secondary[0];
  let personalityKey = PERSONALITY_MAP[mapKey];
  
  // 兜底：如果没有映射，用最接近的
  if (!personalityKey) {
    // 尝试反向
    const reverseKey = secondary[0] + '-' + primary[0];
    personalityKey = PERSONALITY_MAP[reverseKey] || 'fortress';
  }

  // 计算内在冲突值
  const rationalCamp = scores.saver + scores.security;
  const emotionalCamp = scores.spender + scores.risktaker + scores.flyer;
  const crossCamp = (
    (['saver','security'].includes(primary[0]) && ['spender','risktaker','flyer'].includes(secondary[0])) ||
    (['spender','risktaker','flyer'].includes(primary[0]) && ['saver','security'].includes(secondary[0]))
  );
  
  const scoreDiff = primary[1] - secondary[1];
  const proximityScore = scoreDiff <= 2 ? 3 : (scoreDiff <= 5 ? 1 : 0);
  const conflictValue = (crossCamp ? 5 : 0) + proximityScore + conflictExtra;
  
  let conflictLevel;
  if (conflictValue <= 3) conflictLevel = 'low';
  else if (conflictValue <= 7) conflictLevel = 'medium';
  else conflictLevel = 'high';

  // 计算百分比
  const totalScore = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
  const primaryPct = Math.round(primary[1] / totalScore * 100);
  const secondaryPct = Math.round(secondary[1] / totalScore * 100);

  return {
    personalityKey,
    primaryType: primary[0],
    secondaryType: secondary[0],
    primaryScore: primary[1],
    secondaryScore: secondary[1],
    primaryPct,
    secondaryPct,
    scores,
    conflictValue,
    conflictLevel,
    scoreDiff
  };
}

function renderQuadrantChart(currentKey) {
  const pos = PERSONALITY_POSITIONS;

    const isCurrent = key === currentKey;
    const cx = p.x * 3.6 + 40;
    const cy = p.y * 3.2 + 50;
    const r = isCurrent ? 10 : 5;
    const fill = isCurrent ? '#5c4a30' : '#c4a882';
    const opacity = isCurrent ? 1 : 0.5;
    const fontSize = isCurrent ? 13 : 11;
    const fontWeight = isCurrent ? 600 : 300;
    const textFill = isCurrent ? '#2c2416' : '#9a8b6f';
    
    dots += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" opacity="${opacity}"/>`;
    
    // 调整标签位置避免重叠
    let tx = cx;
    let ty = cy - r - 8;
    if (p.y < 30) ty = cy + r + 16;
    
    labels += `<text x="${tx}" y="${ty}" text-anchor="middle" fill="${textFill}" font-size="${fontSize}" font-weight="${fontWeight}" font-family="'Noto Serif SC',serif">${p.label}</text>`;
    
    if (isCurrent) {
      dots += `<circle cx="${cx}" cy="${cy}" r="${r + 6}" fill="none" stroke="#8b6f47" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>`;
    }
  }
  
  return `
    <div class="result-section">
      <div class="section-title">人格象限图</div>

          <text x="220" y="370" text-anchor="middle" fill="#9a8b6f" font-size="12" font-family="'Noto Serif SC',serif" font-style="italic">冒险</text>

function formatText(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .split('\n\n')
    .map(p => p.trim())
    .filter(p => p)
    .map(p => '<p>' + p.replace(/\n/g, '<br>') + '</p>')
    .join('');
}
